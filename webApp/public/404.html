<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Page not found | TABAK++</title>

    <style media="screen">
      * { box-sizing: border-box; }
      body { min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; background: #000 url('/noise.svg'); color: #fff; font-family: Inter, system-ui, sans-serif; margin: 0; padding: 24px; }
      #message { width: min(480px, 100%); padding: 48px; border: 1px solid rgba(255,255,255,.09); border-radius: 28px; background: #0b0b0d; box-shadow: 0 40px 100px #000; }
      #message .logo { color: #10b981; font-size: 18px; font-weight: 900; letter-spacing: -.04em; }
      #message h1 { font-size: clamp(32px, 8vw, 54px); line-height: .95; margin: 28px 0 16px; letter-spacing: -.05em; }
      #message p { color: #8a8a91; line-height: 1.6; margin: 0 0 28px; font-size: 14px; }
      #message a { display: inline-flex; min-height: 48px; align-items: center; background: #10b981; color: #000; padding: 0 22px; border-radius: 12px; font-size: 12px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="message">
      <div class="logo">t++ / 404</div>
      <h1>Route not found.</h1>
      <p>This address is outside the registry. Return to Track to continue counting.</p>
      <a href="/">Return to Track</a>

</html>
